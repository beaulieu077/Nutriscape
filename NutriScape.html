  const [ok,setOk]=useState(false);const [tab,setTab]=useState("dashboard");const [tgt,setTgt]=useState({...DEFT});

  const [selSk,setSelSk]=useState(null);const [modal,setModal]=useState(null);const [cf,setCf]=useState({n:"",cal:0,pro:0});
  const [qf,setQf]=useState("active");const [dr,setDr]=useState("lumbridge");
  const xid=useRef(0),tid2=useRef(0);const today=dk();

  useEffect(()=>{
    try{
      const p=LS.get("ns3-player");const d=LS.get("ns3-d:"+today);const s=LS.get("ns3-set");
      if(p){const v=JSON.parse(p.value);
        if(v.sk)setSk(v.sk);if(v.inv)setInv(v.inv);if(v.eq)setEq(v.eq);if(v.cQ)setCQ(v.cQ);
        if(v.bp)setBp(v.bp);if(v.pets)setPets(v.pets);if(v.cD)setCD(v.cD);if(v.title)setTitle(v.title);
        if(v.gp!=null)setGp(v.gp);if(v.bank)setBank(v.bank);if(v.lootLog)setLootLog(v.lootLog);
        if(v.str!=null)setStr(v.str);if(v.bStr!=null)setBStr(v.bStr);if(v.pd!=null)setPd(v.pd);

        if(v.wg!=null)setWg(v.wg);if(v.scd!=null)setScd(v.scd);if(v.mp!=null)setMp(v.mp);
        if(v.bps!=null)setBps(v.bps);if(v.ps!=null)setPs(v.ps);if(v.lld)setLld(v.lld);if(v.dl!=null)setDl(v.dl);
      }
      if(d){const v=JSON.parse(d.value);if(v.meals)setMeals(v.meals);if(v.supps)setSupps(v.supps);if(v.water!=null)setWater(v.water);if(v.dc)setDc(v.dc);}
      if(s)setTgt(p2=>({...p2,...JSON.parse(s.value)}));
    }catch(e){console.error(e)}
    setOk(true);
  },[]);

  const sP=useCallback(d=>{try{LS.set("ns3-player",JSON.stringify(d))}catch(e){}},[]);
  const sD=useCallback((m,s,w,c)=>{try{LS.set("ns3-d:"+today,JSON.stringify({meals:m,supps:s,water:w,dc:c}))}catch(e){}},[today]);
  const sS=useCallback(t=>{try{LS.set("ns3-set",JSON.stringify(t))}catch(e){}},[]);
  const pData=(ov={})=>({sk:ov.sk||sk,inv:ov.inv||inv,eq:ov.eq||eq,cQ:ov.cQ||cQ,bp:ov.bp||bp,pets:ov.pets||pets,cD:ov.cD||cD,title:ov.title??title,gp:ov.gp??gp,bank:ov.bank||bank,lootLog:ov.lootLog||lootLog,str:ov.str??str,bStr:ov.bStr??bStr,pd:ov.pd??pd,tm:ov.tm??tm,pg:ov.pg??pg,cg:ov.cg??cg,wg:ov.wg??wg,scd:ov.scd??scd,mp:ov.mp??mp,bps:ov.bps??bps,ps:ov.ps??ps,lld:ov.lld||lld,dl:ov.dl??dl});

  const showXP=(s,a)=>{const id=++xid.current;setXpD(p=>[...p,{id,s,a}]);setTimeout(()=>setXpD(p=>p.filter(x=>x.id!==id)),1500);};
  const toast=(t,m,tp="normal")=>{const id=++tid2.current;setToasts(p=>[...p,{id,t,m,tp}]);setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),tp==="rare"?6000:4000);};
  const gXP=(k,a,sks)=>{const ol=getLv(sks[k].xp);const nx=Math.min(sks[k].xp+a,MX);const mg=nx>=MX?a:0;sks[k]={xp:nx,m:(sks[k].m||0)+mg};showXP(k,a);if(getLv(nx)>ol)toast("Level Up!",SK[k].i+" "+SK[k].n+" → Level "+getLv(nx),"lu");return sks;};

  const tCal=meals.reduce((a,m)=>a+m.cal,0),tPro=meals.reduce((a,m)=>a+m.pro,0);
  const sDone=supps.length,sMax=tgt.supplements.length;
  const calM=tCal>=tgt.calories,proM=tPro>=tgt.protein,watM=water>=tgt.water,supM=sDone>=sMax;
  const isPerfect=calM&&proM&&watM&&supM;
  const bk=useMemo(()=>Object.entries(bp).filter(([id,d])=>{const b=BOSSES.find(x=>x.id===id);return b&&(d.kc||0)>0}).length,[bp]);

  const stats=useMemo(()=>{const g=k=>getLv(sk[k]?.xp||0);return{tl:totLv(sk),str,bStr,pd,tm,pg,cg,wg,scd,mp,bps,bk,dl,gp,msl:Math.max(...SKK.map(g)),s10:SKK.filter(k=>g(k)>=10).length,s25:SKK.filter(k=>g(k)>=25).length,s50:SKK.filter(k=>g(k)>=50).length,s70:SKK.filter(k=>g(k)>=70).length,mw:water,ms:sDone,_sk:sk};},[sk,str,bStr,pd,tm,pg,cg,wg,scd,mp,bps,bk,dl,gp,water,sDone]);
  const cmbLv=useMemo(()=>{const g=k=>getLv(sk[k]?.xp||0);return Math.floor(.25*(g("defence")+g("hitpoints")+Math.floor(g("prayer")/2))+.325*Math.max(g("attack")+g("strength"),Math.floor(g("magic")*1.5)));},[sk]);
  const gSt=useMemo(()=>{const s={atk:0,str:0,def:0,hp:0};Object.values(eq).forEach(id=>{const g=GEAR.find(x=>x.id===id);if(g&&g.st)Object.entries(g.st).forEach(([k,v])=>s[k]=(s[k]||0)+v);});return s;},[eq]);

  const canDmgBoss=mech=>{if(mech==="pro")return proM;if(mech==="cal")return calM;if(mech==="pro_cal")return proM&&calM;if(mech==="three")return proM&&calM&&watM;if(mech==="perfect")return isPerfect;if(mech==="perf_180")return isPerfect&&tPro>=180;if(mech==="pss7")return isPerfect&&supM&&str>=7;if(mech==="ps45_200")return isPerfect&&str>=45&&tPro>=200;const pm=mech.match(/^ps(\d+)$/);if(pm)return isPerfect&&str>=parseInt(pm[1]);return false;};

  const addMeal=f=>{const nm=[...meals,f];const ntm=tm+1;setMeals(nm);setTm(ntm);setFs("");let s=JSON.parse(JSON.stringify(sk));if(f.pro>0)s=gXP("strength",Math.floor(f.pro*2.5),s);if(f.cal>0)s=gXP("cooking",Math.floor(f.cal/8),s);s=gXP("agility",15,s);s=gXP("woodcutting",Math.floor(f.cal/20),s);s=gXP("mining",Math.floor(f.pro*1.5),s);setSk(s);sD(nm,supps,water,dc);sP(pData({sk:s,tm:ntm}));};
  const rmMeal=i=>{const nm=meals.filter((_,j)=>j!==i);setMeals(nm);sD(nm,supps,water,dc);};
  const togSupp=n=>{let ns;if(supps.includes(n)){ns=supps.filter(x=>x!==n);}else{ns=[...supps,n];let s=JSON.parse(JSON.stringify(sk));s=gXP("herblore",30,s);setSk(s);sP(pData({sk:s}));}setSupps(ns);sD(meals,ns,water,dc);};
  const addW=()=>{const nw=water+1;setWater(nw);let s=JSON.parse(JSON.stringify(sk));s=gXP("prayer",20,s);setSk(s);sD(meals,supps,nw,dc);sP(pData({sk:s}));};
  const subW=()=>{if(water<=0)return;const nw=water-1;setWater(nw);sD(meals,supps,nw,dc);};

  const rollLoot=boss=>{const drops=[];for(const l of boss.loot){if(Math.random()<1/l.r){const it=GEAR.find(g=>g.id===l.id)||RARES.find(r=>r.id===l.id);if(it)drops.push({...l,item:it,isRare:!!RARES.find(r=>r.id===l.id)});}}return drops;};

  const claimDaily=()=>{
    if(dc)return;let s=JSON.parse(JSON.stringify(sk));
    const pct=[tCal/tgt.calories,tPro/tgt.protein,water/tgt.water,sMax>0?sDone/sMax:1].map(v=>Math.min(v,1)).reduce((a,b)=>a+b,0)/4;
    s=gXP("hitpoints",Math.floor(pct*250),s);if(calM&&proM)s=gXP("defence",200,s);

        <div className="pnl"><div className="ph">💰 Wealth: <span className="gp" style={{marginLeft:6}}>{fmtGP(gp)} GP</span></div><div className="pb" style={{fontSize:11}}>Earn GP from daily claims, quest rewards, and boss loot.</div></div>
        <div className="pnl"><div className="ph">📕 Collection Log ({lootLog.length})</div><div className="pb">
          {BOSSES.map(b=>{const hasAny=b.loot.some(l=>lootLog.includes(l.id));if(!hasAny&&(bp[b.id]?.kc||0)===0)return null;return(<div key={b.id} style={{marginBottom:8}}><div style={{fontSize:11,fontFamily:"Cinzel,serif",color:"#c8a84e",marginBottom:3}}>{b.ic} {b.nm} — KC: {bp[b.id]?.kc||0}</div><div style={{display:"flex",flexWrap:"wrap",gap:2}}>{b.loot.map(l=>{const it=GEAR.find(g=>g.id===l.id)||RARES.find(r=>r.id===l.id);const got=lootLog.includes(l.id);return <span key={l.id} className={"loot-item loot-"+lootRarity(l.r)} style={got?{}:{opacity:.3}}>{it?.ic||"?"} {it?.nm||l.id} {got&&"✓"}</span>;})}</div></div>);})}
          {lootLog.length===0&&<div style={{color:"#4a3a22",fontSize:11,textAlign:"center"}}>Kill bosses to fill your collection log!</div>}
        </div></div>
        <div className="pnl"><div className="ph">🐾 Pets ({pets.length}/{BOSSES.filter(b=>b.pet).length})</div><div className="pb"><div className="pet-g">{BOSSES.filter(b=>b.pet).map(b=><div key={b.id} className={"pet"+(pets.includes(b.pet.ic)?" owned":" locked")} title={b.pet.nm}>{b.pet.ic}</div>)}</div></div></div>
        <div className="pnl"><div className="ph">🏅 Titles</div><div className="pb"><div style={{display:"flex",flexWrap:"wrap",gap:3}}>{TITLES.map(t=>{const own=t.r(stats);return(<div key={t.id} className={"tp"+(own?" owned":" locked")} onClick={()=>{if(own){const nt=title===t.nm?null:t.nm;setTitle(nt);sP(pData({title:nt}));}}} style={title===t.nm?{background:"rgba(200,168,78,.2)"}:{}}>{t.nm}</div>);})}</div></div></div>
        <div className="pnl"><div className="ph">📊 Stats</div><div className="pb" style={{fontSize:11,display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
          <div>Days Logged: <b className="gp">{dl}</b></div><div>Perfect Days: <b className="gp">{pd}</b></div>
          <div>Streak: <b className="gp">{str}</b></div><div>Best Streak: <b className="gp">{bStr}</b></div>
          <div>Perfect Streak: <b className="gp">{bps}</b></div><div>Total Meals: <b className="gp">{tm}</b></div>
          <div>Protein Goals: <b className="gp">{pg}</b></div><div>Cal Goals: <b className="gp">{cg}</b></div>
          <div>Water Goals: <b className="gp">{wg}</b></div><div>Supps Days: <b className="gp">{scd}</b></div>
          <div>Max Protein: <b className="gp">{mp}g</b></div><div>Bosses Slain: <b className="gp">{bk}/{BOSSES.length}</b></div>
        </div></div>
      </div>}

      {tab==="settings"&&<div>
        <div className="pnl"><div className="ph">⚙️ Targets</div><div className="pb">
          <div style={{display:"grid",gridTemplateColumns:"1fr 85px",gap:5,alignItems:"center"}}>
            {[["Calories","calories"],["Protein (g)","protein"],["Water (cups)","water"]].map(([l,k])=>(
              <React.Fragment key={k}><div style={{fontSize:11,color:"#c8a84e",fontFamily:"Cinzel,serif"}}>{l}</div>
              <input className="inp" type="number" value={tgt[k]} onChange={e=>{const nt={...tgt,[k]:Number(e.target.value)};setTgt(nt);sS(nt);}}/></React.Fragment>
            ))}
          </div>
        </div></div>
        <div className="pnl"><div className="ph">🧪 Manage Supps</div><div className="pb">
          <button className="btn btn-s btn-o" style={{marginBottom:6}} onClick={()=>setModal("as")}>+ Add</button>
          {tgt.supplements.map(s=><div key={s} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #16110a",fontSize:11}}><span>{s}</span><button className="mr" onClick={()=>{const nt={...tgt,supplements:tgt.supplements.filter(x=>x!==s)};setTgt(nt);sS(nt);setSupps(supps.filter(x=>x!==s));}}>×</button></div>)}
        </div></div>
        <div className="pnl"><div className="ph">⚠️ Reset</div><div className="pb" style={{textAlign:"center"}}>
          <button className="btn btn-d" onClick={()=>{if(confirm("Reset ALL progress?")){localStorage.removeItem("ns3-player");localStorage.removeItem("ns3-d:"+today);localStorage.removeItem("ns3-set");location.reload();}}}>Reset All</button>
        </div></div>
      </div>}
    </div>

    <div className="xdc">{xpD.map(d=><div key={d.id} className="xd">{SK[d.s]?.i} +{d.a} {SK[d.s]?.n}</div>)}</div>
    <div className="tc">{toasts.map(t=><div key={t.id} className={"tst"+(t.tp==="lu"?" lu":t.tp==="rare"?" rare":"")}><div className="tst-t">{t.t}</div><div className="tst-m">{t.m}</div></div>)}</div>

    {modal==="cf"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>🍽️ Custom Food</h3>
      {[["Name","n","text"],["Calories","cal","number"],["Protein (g)","pro","number"]].map(([l,k,t])=>(<div key={k} style={{marginBottom:5}}><div style={{fontSize:9,color:"#7a6a50"}}>{l}</div><input className="inp" type={t} value={cf[k]} onChange={e=>setCf(p=>({...p,[k]:t==="number"?Number(e.target.value):e.target.value}))}/></div>))}
      <div style={{display:"flex",gap:6,marginTop:8}}><button className="btn" onClick={()=>{if(!cf.n)return;addMeal(cf);setCf({n:"",cal:0,pro:0});setModal(null);}}>Add</button><button className="btn btn-o" onClick={()=>setModal(null)}>Cancel</button></div>
    </div></div>}

    {modal==="as"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>🧪 Add Supplement</h3>
      <input className="inp" placeholder="Name..." autoFocus onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){const n=e.target.value.trim();if(!tgt.supplements.includes(n)){const nt={...tgt,supplements:[...tgt.supplements,n]};setTgt(nt);sS(nt);}e.target.value="";setModal(null);}}}/>
      <div style={{fontSize:9,color:"#7a6a50",marginTop:3}}>Press Enter</div>
      <button className="btn btn-o" style={{marginTop:8}} onClick={()=>setModal(null)}>Close</button>
    </div></div>}

    {modal&&modal.t==="gd"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>{modal.it.ic} {modal.it.nm}</h3>
      <div style={{fontSize:11,color:"#7a6a50",marginBottom:5}}>Slot: {modal.it.sl} · Tier {modal.it.t}{modal.it.gp>0?" · "+fmtGP(modal.it.gp)+" GP":""}</div>
      {Object.entries(modal.it.st).map(([k,v])=><div key={k} style={{color:"#5ddb5d",fontSize:12}}>+{v} {k}</div>)}
      <div style={{marginTop:5,fontSize:10,color:"#7a6a50"}}>Req: {Object.entries(modal.it.rq).map(([k,l])=>SK[k]?.n+" "+l).join(", ")}</div>
      <button className="btn btn-o" style={{marginTop:8}} onClick={()=>setModal(null)}>Close</button>
    </div></div>}

  </div></div>);
}

ReactDOM.render(React.createElement(NutriScape), document.getElementById("root"));
</script>
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 6px rgba(200,168,78,.25)}50%{box-shadow:0 0 18px rgba(200,168,78,.6)}}
@keyframes xpDrop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
@keyframes bossIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes rareGlow{0%,100%{box-shadow:0 0 12px rgba(160,50,255,.4)}50%{box-shadow:0 0 30px rgba(160,50,255,.8)}}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:#110d06}::-webkit-scrollbar-thumb{background:#4a3a22;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#c8a84e}
body{background:#0b0804;color:#ddd2be;font-family:'Nunito Sans',sans-serif;overflow-x:hidden}
.app{min-height:100vh;background:linear-gradient(180deg,#0b0804,#151008 50%,#0b0804)}
.hdr{background:linear-gradient(180deg,#1c150b,#120e07);border-bottom:2px solid #2e2214;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.logo{font-family:'Cinzel',serif;font-weight:900;font-size:20px;background:linear-gradient(135deg,#c8a84e,#f0d878,#c8a84e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hs{display:flex;gap:12px;align-items:center;font-size:11px;flex-wrap:wrap}
.hs>div{display:flex;align-items:center;gap:3px;color:#c8a84e;font-family:'Cinzel',serif;font-weight:600}
.hs>div span{color:#ddd2be;font-family:'Nunito Sans',sans-serif;font-weight:700}
.nav{display:flex;background:#120e07;border-bottom:1px solid #231a10;overflow-x:auto;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}
.nav button{padding:9px 12px;font-family:'Cinzel',serif;font-size:10.5px;font-weight:600;color:#7a6a50;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .2s;letter-spacing:.4px}
.nav button:hover{color:#c8a84e;background:rgba(200,168,78,.04)}.nav button.on{color:#c8a84e;border-bottom-color:#c8a84e;background:rgba(200,168,78,.07)}
.ct{padding:14px;max-width:880px;margin:0 auto;animation:fadeIn .25s ease}
.pnl{background:linear-gradient(135deg,#16110a,#1c150d);border:1px solid #261e12;border-radius:6px;margin-bottom:11px;overflow:hidden}
.ph{background:linear-gradient(90deg,#201810,#16110a);padding:9px 13px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#c8a84e;border-bottom:1px solid #261e12;display:flex;align-items:center;gap:7px}
.pb{padding:12px}
.ptr{background:#0b0804;border-radius:3px;height:16px;overflow:hidden;border:1px solid #261e12;position:relative}
.pfl{height:100%;border-radius:2px;transition:width .4s;position:relative}
.pfl::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent)}
.ptx{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);z-index:1;white-space:nowrap}
.nr{display:grid;grid-template-columns:90px 60px 1fr;gap:8px;align-items:center;margin-bottom:7px}
.nlb{font-size:12px;color:#c8a84e;font-family:'Cinzel',serif;font-weight:600}
.nvl{font-size:12px;text-align:center;font-weight:700;font-family:'Fira Code',monospace}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:6px}
.stile{background:linear-gradient(135deg,#16110a,#0b0804);border:1px solid #261e12;border-radius:4px;padding:6px;cursor:pointer;text-align:center;transition:all .2s}
.stile:hover{border-color:#c8a84e;transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.3)}
.stile.sel{border-color:#c8a84e;animation:pulseGold 2s infinite}
.si{font-size:20px}.slv{font-size:16px;font-weight:700}.sn{font-family:'Cinzel',serif;font-size:10px;color:#c8a84e;font-weight:600}.sxm{font-size:8px;color:#7a6a50;font-family:'Fira Code',monospace}
.inp{background:#0b0804;border:1px solid #261e12;color:#ddd2be;padding:7px 10px;border-radius:4px;font-family:'Nunito Sans',sans-serif;font-size:13px;width:100%;transition:border-color .2s}
.inp:focus{outline:none;border-color:#c8a84e}.inp::placeholder{color:#4a3a22}
.btn{background:linear-gradient(180deg,#c8a84e,#9b7c30);color:#0b0804;border:1px solid #d4b85a;padding:7px 14px;border-radius:4px;font-family:'Cinzel',serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;letter-spacing:.4px}
.btn:hover{background:linear-gradient(180deg,#d4b85a,#a88835);transform:translateY(-1px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-s{padding:4px 9px;font-size:10px}
.btn-d{background:linear-gradient(180deg,#7b2828,#5b1818);border-color:#903030;color:#ddd2be}
.btn-g{background:linear-gradient(180deg,#357035,#255525);border-color:#409040;color:#ddd2be}
.btn-o{background:transparent;border-color:#2e2214;color:#c8a84e}.btn-o:hover{background:rgba(200,168,78,.08)}
.spp{display:flex;flex-wrap:wrap;gap:6px}
.sp{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:16px;background:#0b0804;border:1px solid #261e12;cursor:pointer;transition:all .2s;font-size:12px}
.sp.on{background:rgba(61,155,61,.12);border-color:#3d9b3d;color:#5ddb5d}.sp:hover{border-color:#c8a84e}
.ck{width:13px;height:13px;border-radius:50%;border:2px solid #2e2214;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.sp.on .ck{border-color:#3d9b3d;background:#3d9b3d}
.qc{background:linear-gradient(135deg,#0b0804,#16110a);border:1px solid #261e12;border-radius:5px;padding:10px;margin-bottom:6px;animation:slideIn .2s;transition:border-color .2s}
.qc:hover{border-color:#2e2214}.qc.done{border-color:#2d5428;background:linear-gradient(135deg,rgba(45,84,40,.06),#0b0804)}
.bc{background:linear-gradient(135deg,#180808,#16110a);border:1px solid #3a1212;border-radius:6px;padding:14px;margin-bottom:9px;text-align:center}
.bi{font-size:42px;animation:bossIdle 2s ease-in-out infinite}
.gg{display:grid;grid-template-areas:". helmet .""cape amulet weapon"". body shield"". legs .""gloves boots ring";grid-template-columns:repeat(3,70px);gap:5px;justify-content:center;margin:10px 0}
.gs{width:70px;height:70px;background:#0b0804;border:1px solid #261e12;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.gs:hover{border-color:#c8a84e}
.gs .sl{font-size:7px;color:#4a3a22;text-transform:uppercase;position:absolute;bottom:3px}
.gs .gi{font-size:22px}.gs .gn{font-size:7px;color:#c8a84e;text-align:center;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gs.helmet{grid-area:helmet}.gs.cape{grid-area:cape}.gs.amulet{grid-area:amulet}.gs.weapon{grid-area:weapon}.gs.body{grid-area:body}.gs.shield{grid-area:shield}.gs.legs{grid-area:legs}.gs.gloves{grid-area:gloves}.gs.boots{grid-area:boots}.gs.ring{grid-area:ring}
.inv{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:5px;margin-top:8px}
.iv{background:#0b0804;border:1px solid #261e12;border-radius:4px;padding:5px;text-align:center;cursor:pointer;transition:all .2s;font-size:10px}
.iv:hover{border-color:#c8a84e;transform:translateY(-1px)}
.fl{max-height:170px;overflow-y:auto}
.fi{padding:6px 8px;border-bottom:1px solid #16110a;cursor:pointer;transition:background .12s;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.fi:hover{background:rgba(200,168,78,.06)}
.mi{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #16110a;font-size:12px;animation:slideIn .2s}
.mr{color:#7b2828;cursor:pointer;font-size:15px;padding:0 3px;background:none;border:none}.mr:hover{color:#d44}
.xdc{position:fixed;top:65px;right:14px;z-index:200;pointer-events:none}
.xd{font-family:'Cinzel',serif;font-weight:700;font-size:14px;color:#c8a84e;text-shadow:0 0 8px rgba(200,168,78,.4),0 2px 4px rgba(0,0,0,.8);animation:xpDrop 1.4s ease forwards;margin-bottom:2px}
.tc{position:fixed;bottom:14px;right:14px;z-index:300}
.tst{background:linear-gradient(135deg,#201810,#16110a);border:1px solid #c8a84e;border-radius:5px;padding:10px 13px;margin-top:5px;animation:fadeIn .3s;max-width:300px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.tst-t{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#c8a84e}.tst-m{font-size:11px;color:#ddd2be;margin-top:2px}
.tst.lu{border-color:#f0d878;box-shadow:0 0 15px rgba(240,216,120,.3)}
.tst.rare{border-color:#a032ff;box-shadow:0 0 20px rgba(160,50,255,.5);animation:rareGlow 1.5s ease 2}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.md{background:linear-gradient(135deg,#16110a,#1c150d);border:1px solid #c8a84e;border-radius:7px;padding:18px;max-width:420px;width:92%;max-height:80vh;overflow-y:auto}
.md h3{font-family:'Cinzel',serif;color:#c8a84e;margin-bottom:10px}
.dt{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;border-bottom:1px solid #16110a}.dt:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;border:2px solid #261e12;flex-shrink:0}.dot.ok{background:#3d9b3d;border-color:#3d9b3d}
.loot-item{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;margin:2px;border:1px solid}
.loot-common{border-color:#4a3a22;color:#8a7a60}.loot-uncommon{border-color:#3d9b3d;color:#5ddb5d}.loot-rare{border-color:#3579c4;color:#6bb5e0}.loot-vrare{border-color:#a032ff;color:#c878ff}.loot-mega{border-color:#ff3030;color:#ff6060}
.gp{color:#daa520;font-family:'Fira Code',monospace;font-weight:600}
.pet-g{display:flex;flex-wrap:wrap;gap:7px}
.pet{width:46px;height:46px;border-radius:50%;background:#0b0804;border:2px solid #261e12;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s}
.pet.owned{border-color:#c8a84e;animation:pulseGold 3s infinite}.pet.locked{opacity:.25;filter:grayscale(1)}
.tp{display:inline-flex;padding:2px 9px;border-radius:11px;font-size:10px;font-family:'Cinzel',serif;font-weight:600;margin:2px;cursor:pointer}
.tp.owned{background:rgba(200,168,78,.1);border:1px solid #c8a84e;color:#c8a84e}.tp.locked{background:#0b0804;border:1px solid #1a1108;color:#3a3020}
@media(max-width:600px){.sgrid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}.gg{grid-template-columns:repeat(3,58px)}.gs{width:58px;height:58px}.hs{gap:6px;font-size:9px}.logo{font-size:15px}.ct{padding:8px}.nr{grid-template-columns:75px 50px 1fr}}
</style>
