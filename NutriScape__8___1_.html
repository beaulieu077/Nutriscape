const xpFor = l => XT[l]||0;

const mxpFor = l => Math.floor(l*l*l*50);
const getMlv = mx => { for (let i = 1; i <= 120; i++) if (mx < mxpFor(i)) return i-1; return 120; };

  const pData=(ov={})=>({sk:ov.sk||sk,inv:ov.inv||inv,eq:ov.eq||eq,cQ:ov.cQ||cQ,bp:ov.bp||bp,pets:ov.pets||pets,cD:ov.cD||cD,title:ov.title??title,gp:ov.gp??gp,bank:ov.bank||bank,lootLog:ov.lootLog||lootLog,str:ov.str??str,bStr:ov.bStr??bStr,pd:ov.pd??pd,tm:ov.tm??tm,pg:ov.pg??pg,cg:ov.cg??cg,wg:ov.wg??wg,scd:ov.scd??scd,mp:ov.mp??mp,bps:ov.bps??bps,ps:ov.ps??ps,lld:ov.lld||lld,dl:ov.dl??dl});

  const showXP=(s,a)=>{const id=++xid.current;setXpD(p=>[...p,{id,s,a}]);setTimeout(()=>setXpD(p=>p.filter(x=>x.id!==id)),1500);};
  const toast=(t,m,tp="normal")=>{const id=++tid2.current;setToasts(p=>[...p,{id,t,m,tp}]);setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),tp==="rare"?6000:4000);};
  const gXP=(k,a,sks)=>{const ol=getLv(sks[k].xp);const nx=Math.min(sks[k].xp+a,MX);const mg=nx>=MX?a:0;sks[k]={xp:nx,m:(sks[k].m||0)+mg};showXP(k,a);if(getLv(nx)>ol)toast("Level Up!",SK[k].n+" → Level "+getLv(nx),"lu");return sks;};

  const tCal=meals.reduce((a,m)=>a+m.cal,0),tPro=meals.reduce((a,m)=>a+m.pro,0);
  const sDone=supps.length,sMax=tgt.supplements.length;
  const calM=tCal>=tgt.calories,proM=tPro>=tgt.protein,watM=water>=tgt.water,supM=sDone>=sMax;
  const isPerfect=calM&&proM&&watM&&supM;
  const bk=useMemo(()=>Object.entries(bp).filter(([id,d])=>{const b=BOSSES.find(x=>x.id===id);return b&&(d.kc||0)>0}).length,[bp]);

  const stats=useMemo(()=>{const g=k=>getLv(sk[k]?.xp||0);return{tl:totLv(sk),str,bStr,pd,tm,pg,cg,wg,scd,mp,bps,bk,dl,gp,msl:Math.max(...SKK.map(g)),s10:SKK.filter(k=>g(k)>=10).length,s25:SKK.filter(k=>g(k)>=25).length,s50:SKK.filter(k=>g(k)>=50).length,s70:SKK.filter(k=>g(k)>=70).length,mw:water,ms:sDone,_sk:sk};},[sk,str,bStr,pd,tm,pg,cg,wg,scd,mp,bps,bk,dl,gp,water,sDone]);
  const cmbLv=useMemo(()=>{const g=k=>getLv(sk[k]?.xp||0);return Math.floor(.25*(g("defence")+g("hitpoints")+Math.floor(g("prayer")/2))+.325*Math.max(g("attack")+g("strength"),Math.floor(g("magic")*1.5)));},[sk]);
  const gSt=useMemo(()=>{const s={atk:0,str:0,def:0,hp:0};Object.values(eq).forEach(id=>{const g=GEAR.find(x=>x.id===id);if(g&&g.st)Object.entries(g.st).forEach(([k,v])=>s[k]=(s[k]||0)+v);});return s;},[eq]);

  const canDmgBoss=mech=>{if(mech==="pro")return proM;if(mech==="cal")return calM;if(mech==="pro_cal")return proM&&calM;if(mech==="three")return proM&&calM&&watM;if(mech==="perfect")return isPerfect;if(mech==="perf_180")return isPerfect&&tPro>=180;if(mech==="perf_sup")return isPerfect&&supM;if(mech==="pss7")return isPerfect&&supM&&str>=7;if(mech==="ps45_200")return isPerfect&&str>=45&&tPro>=200;const pm=mech.match(/^ps(\d+)$/);if(pm)return isPerfect&&str>=parseInt(pm[1]);return false;};

  const addMeal=f=>{const nm=[...meals,f];const ntm=tm+1;setMeals(nm);setTm(ntm);setFs("");let s=JSON.parse(JSON.stringify(sk));if(f.pro>0)s=gXP("strength",Math.floor(f.pro*2.5),s);if(f.cal>0)s=gXP("cooking",Math.floor(f.cal/8),s);s=gXP("agility",15,s);s=gXP("woodcutting",Math.floor(f.cal/20),s);s=gXP("mining",Math.floor(f.pro*1.5),s);setSk(s);sD(nm,supps,water,dc);sP(pData({sk:s,tm:ntm}));};

  const addW=()=>{const nw=water+1;setWater(nw);let s=JSON.parse(JSON.stringify(sk));s=gXP("prayer",20,s);setSk(s);sD(meals,supps,nw,dc);sP(pData({sk:s}));};
  const subW=()=>{if(water<=0)return;const nw=water-1;setWater(nw);sD(meals,supps,nw,dc);};

  const rollLoot=boss=>{const drops=[];for(const l of boss.loot){if(Math.random()<1/l.r){const it=GEAR.find(g=>g.id===l.id)||RARES.find(r=>r.id===l.id);if(it)drops.push({...l,item:it,isRare:!!RARES.find(r=>r.id===l.id)});}}return drops;};

  const claimDaily=()=>{
    if(dc)return;let s=JSON.parse(JSON.stringify(sk));
    const pct=[tCal/tgt.calories,tPro/tgt.protein,water/tgt.water,sMax>0?sDone/sMax:1].map(v=>Math.min(v,1)).reduce((a,b)=>a+b,0)/4;
    s=gXP("hitpoints",Math.floor(pct*250),s);if(calM&&proM)s=gXP("defence",200,s);
    let ns=str,nbs=bStr,npd=pd,npg=pg,ncg=cg,nwg=wg,nscd=scd,nmp=mp,nbps=bps,nps=ps,ndl=dl+1,ngp=gp;
    if(calM)ncg++;if(proM)npg++;if(watM)nwg++;if(supM)nscd++;if(tPro>nmp)nmp=tPro;
    if(lld){const diff=Math.floor((new Date(today)-new Date(lld))/864e5);if(diff===1)ns++;else if(diff>1)ns=1;}else ns=1;
    if(ns>nbs)nbs=ns;
    if(isPerfect){npd++;nps++;s=gXP("magic",400,s);s=gXP("attack",60*ns,s);if(nps>nbps)nbps=nps;}else nps=0;
    s=gXP("crafting",Math.floor(pct*100),s);ngp+=Math.floor(pct*1000)+ns*200+(isPerfect?5000:0);
    let nCQ=[...cQ],nInv=[...inv],nLL=[...lootLog];
    const qs={meals:meals.length,tm:tm+meals.length,str:ns,pd:npd,pg:npg,cg:ncg,wg:nwg,scd:nscd,mp:nmp,ps:nps,bps:nbps,bk,sk50:SKK.filter(k=>getLv(s[k]?.xp||0)>=50).length,tl:totLv(s),perf:isPerfect?1:0,pro_g:proM?1:0,cal_g:calM?1:0,wat_g:watM?1:0,all_sup:supM?1:0,pro50:tPro>=50?1:0,pro150:tPro>=150?1:0,pro200:tPro>=200?1:0,pro_cal:proM&&calM?1:0,perf200:isPerfect&&tPro>=200?1:0,supps5:sDone>=5?1:0,meals3:meals.length>=3?1:0,water_any:water>=1?1:0,supp_any:sDone>=1?1:0};
    QUESTS.forEach(q=>{if(nCQ.includes(q.id))return;if(q.pre.some(p=>!nCQ.includes(p)))return;let met=false;const g=q.goal;
      if(g.meals&&qs.meals>=g.meals)met=true;if(g.meals3&&qs.meals3)met=true;if(g.water_any&&qs.water_any)met=true;if(g.supp_any&&qs.supp_any)met=true;if(g.pro50&&qs.pro50)met=true;if(g.supps5&&qs.supps5)met=true;if(g.cal_g&&qs.cal_g)met=true;if(g.pro_g&&qs.pro_g)met=true;if(g.wat_g&&qs.wat_g)met=true;if(g.pro_cal&&qs.pro_cal)met=true;if(g.all_sup&&qs.all_sup)met=true;if(g.perf&&qs.perf)met=true;if(g.pro150&&qs.pro150)met=true;if(g.pro200&&qs.pro200)met=true;if(g.perf200&&qs.perf200)met=true;if(g.str&&ns>=g.str)met=true;if(g.tm&&qs.tm>=g.tm)met=true;if(g.pd&&npd>=g.pd)met=true;if(g.ps&&nps>=g.ps)met=true;if(g.scd&&nscd>=g.scd)met=true;if(g.pg&&npg>=g.pg)met=true;if(g.bk&&bk>=g.bk)met=true;if(g.sk50&&qs.sk50>=g.sk50)met=true;if(g.tl&&qs.tl>=g.tl)met=true;
      if(met){nCQ.push(q.id);Object.entries(q.xpR).forEach(([k,v])=>{s=gXP(k,v,s);});ngp+=q.gp;if(q.gearR&&!nInv.includes(q.gearR)){nInv.push(q.gearR);const gi=GEAR.find(x=>x.id===q.gearR);toast("Quest Complete!",q.nm+" — "+(gi?gi.nm:q.gearR)+"!","lu");}else toast("Quest Complete!",q.nm+(q.gp>0?" — "+fmtGP(q.gp)+" GP":""),"lu");}
    });
    let nCD=[...cD];const ds={...stats,str:ns,bStr:nbs,pd:npd,pg:npg,cg:ncg,wg:nwg,scd:nscd,mp:nmp,bps:nbps,bk,tm:qs.tm,tl:totLv(s),msl:Math.max(...SKK.map(k=>getLv(s[k]?.xp||0))),s10:SKK.filter(k=>getLv(s[k]?.xp||0)>=10).length,s25:SKK.filter(k=>getLv(s[k]?.xp||0)>=25).length,s50:SKK.filter(k=>getLv(s[k]?.xp||0)>=50).length,s70:SKK.filter(k=>getLv(s[k]?.xp||0)>=70).length,mw:water,ms:sDone,_sk:s};
    Object.entries(DIARIES).forEach(([rg,tiers])=>{Object.entries(tiers).forEach(([tier,tasks])=>{tasks.forEach(t=>{if(!nCD.includes(t.id)&&t.c(ds)){nCD.push(t.id);s=gXP("crafting",DXP[tier],s);toast("Diary Task!",DREG[rg].ic+" "+tier+": "+t.d);}});});});
    const nbp={...bp};Object.keys(nbp).forEach(k=>{if(nbp[k])nbp[k]={...nbp[k],todayKilled:false};});
    setSk(s);setStr(ns);setBStr(nbs);setPd(npd);setPg(npg);setCg(ncg);setWg(nwg);setScd(nscd);setMp(nmp);setBps(nbps);setPs(nps);setLld(today);setDl(ndl);setDc(true);setCQ(nCQ);setInv(nInv);setCD(nCD);setGp(ngp);setBp(nbp);setLootLog(nLL);
    toast("Daily Claimed!",(isPerfect?"✨ Perfect Day! ":"")+(ns>1?"🔥 "+ns+"d streak ":"")+" +"+fmtGP(Math.floor(pct*1000)+ns*200+(isPerfect?5000:0))+" GP");
    sD(meals,supps,water,true);sP(pData({sk:s,inv:nInv,cQ:nCQ,cD:nCD,bp:nbp,lootLog:nLL,gp:ngp,str:ns,bStr:nbs,pd:npd,tm,pg:npg,cg:ncg,wg:nwg,scd:nscd,mp:nmp,bps:nbps,ps:nps,lld:today,dl:ndl}));
  };

  const atkBoss=bid=>{
    const boss=BOSSES.find(b=>b.id===bid);if(!boss)return;
    for(const[k,l]of Object.entries(boss.req))if(getLv(sk[k]?.xp||0)<l){toast("Req not met","Need "+SK[k].n+" "+l);return;}
    const bpd=bp[bid]||{dmg:0,kc:0,todayKilled:false};
    if(bpd.todayKilled){toast("Already fought!","Fight again tomorrow.");return;}
    if(!canDmgBoss(boss.mech)){toast("No damage!","Meet the mechanic.");return;}
    const nbp={...bp};const nd=(bpd.dmg||0)+boss.dmg;let nkc=bpd.kc||0;
    let s=JSON.parse(JSON.stringify(sk));let np=[...pets];let ngp=gp;let nInv=[...inv],nLL=[...lootLog];
    if(nd>=boss.hp){nkc++;nbp[bid]={dmg:0,kc:nkc,todayKilled:true};
      Object.entries(boss.xpR).forEach(([k,v])=>{s=gXP(k,v,s);});
      const drops=rollLoot(boss);const gpDrop=Math.floor(boss.hp*10+Math.random()*boss.hp*5);ngp+=gpDrop;
      let msg=boss.nm+" slain! KC: "+nkc+" — +"+fmtGP(gpDrop)+" GP";
      drops.forEach(d=>{const gI=GEAR.find(g=>g.id===d.id);if(gI&&!nInv.includes(d.id))nInv.push(d.id);if(!nLL.includes(d.id))nLL.push(d.id);ngp+=(d.item.gp||0);const r=lootRarity(d.r);if(r==="vrare"||r==="mega")toast("🟣 RARE DROP!",(d.item.ic||"")+" "+d.item.nm+" (1/"+d.r+")"+(d.item.gp>0?" — "+fmtGP(d.item.gp)+" GP":""),"rare");else msg+=" | "+(d.item.ic||"")+" "+d.item.nm;});
      if(boss.pet&&!np.includes(boss.pet.ic)){if(Math.random()<1/Math.max(5,nkc*2)){np.push(boss.pet.ic);toast("🐾 PET DROP!",boss.pet.ic+" "+boss.pet.nm+"!","rare");}}
      toast("Boss Defeated!",msg,"lu");
    }else{nbp[bid]={dmg:nd,kc:nkc,todayKilled:true};s=gXP("slayer",Math.floor(boss.dmg/2),s);toast("Hit!",boss.dmg+" dmg → "+boss.nm+" ("+nd+"/"+boss.hp+")");}
    setSk(s);setBp(nbp);setPets(np);setGp(ngp);setInv(nInv);setLootLog(nLL);sP(pData({sk:s,bp:nbp,pets:np,gp:ngp,inv:nInv,lootLog:nLL}));
  };

  const eqItem=id=>{const it=GEAR.find(g=>g.id===id);if(!it)return;for(const[k,l]of Object.entries(it.rq))if(getLv(sk[k]?.xp||0)<l){toast("Can't equip","Need "+SK[k].n+" "+l);return;}const ne={...eq,[it.sl]:id};setEq(ne);sP(pData({eq:ne}));toast("Equipped!",it.nm);};
  const fFoods=fs.length>0?[...customFoods,...FOODS].filter(f=>f.n.toLowerCase().includes(fs.toLowerCase())):customFoods.length>0?customFoods.slice(0,8):[];
  const TABS=[["dashboard","Home"],["nutrition","Nutrition"],["supplements","Supps"],["skills","Skills"],["quests","Quests"],["gear","Gear"],["bosses","Bosses"],["diaries","Diaries"],["collection","Collection"],["settings","Settings"]];

  if(!ok)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0b0804"}},React.createElement("div",{style:{fontFamily:"Cinzel,serif",color:"#c8a84e",fontSize:20}},"Loading NutriScape..."));

  return (<div><div className="app">
    <div className="hdr"><div className="logo">NUTRISCAPE</div><div className="hs">
      {title&&<div style={{color:"#f0d878",fontSize:10}}>{title}</div>}
      <div><Ic id="attack" s={14}/> <span>{cmbLv}</span></div><div><Ic id="prayer" s={14}/> <span>{totLv(sk)}</span></div><div><Ic id="fire" s={14}/> <span>{str}d</span></div><div><Ic id="gp_coin" s={14}/> <span className="gp">{fmtGP(gp)}</span></div>
    </div></div>
    <div className="nav">{TABS.map(([k,l])=><button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>{l}</button>)}</div>
    <div className="ct">
      {tab==="dashboard"&&<div>
        <div className="pnl"><div className="ph"><Ic id="scroll" s={18}/> Daily — {today}</div><div className="pb">
          {[["cooking","Calories",tCal,tgt.calories,"#c8a84e"],["strength","Protein",Math.round(tPro),tgt.protein,"#c42b2b"],["prayer","Water",water,tgt.water,"#6bb5e0"],["herblore","Supps",sDone,sMax,"#3d9b3d"]].map(([ic,l,v,t,c])=>(<div className="nr" key={l}><div className="nlb" style={{display:"flex",alignItems:"center",gap:4}}><Ic id={ic} s={16}/> {l}</div><div className="nvl">{v}/{t}</div><div className="ptr"><div className="ptx">{Math.min(Math.round(v/t*100),100)}%</div><div className="pfl" style={{width:Math.min(v/t*100,100)+"%",background:"linear-gradient(90deg,"+c+","+c+"cc)"}}/></div></div>))}
        </div></div>
        <div className="pnl"><div className="ph"><Ic id="chest" s={18}/> End of Day</div><div className="pb" style={{textAlign:"center"}}>

          {str>0&&<div style={{marginTop:5,fontSize:11,color:"#c8a84e",display:"flex",alignItems:"center",justifyContent:"center",gap:3}}><Ic id="fire" s={14}/> {str}d streak {bStr>str?"(best: "+bStr+")":""}</div>}

        <div style={{marginTop:10}}><button className="btn btn-s btn-o" onClick={()=>setModal("as")}>+ Add</button></div>
      </div></div>}

      {tab==="skills"&&<div>
        <div className="pnl"><div className="ph"><Ic id="hitpoints" s={18}/> Skills — Total: {totLv(sk)}</div><div className="pb"><div className="sgrid">{SKK.map(k=>{const d=SK[k],xp=sk[k]?.xp||0;return(<div key={k} className={"stile"+(selSk===k?" sel":"")} onClick={()=>setSelSk(selSk===k?null:k)}><div className="si"><Ic id={d.i} s={28}/></div><div className="slv">{getLv(xp)}</div><div className="sn">{d.n}</div><div className="sxm">{xp>=1e3?(xp/1e3).toFixed(1)+"k":xp}</div></div>);})}</div></div></div>
        {selSk&&(()=>{const d=SK[selSk],xp=sk[selSk]?.xp||0,ml=sk[selSk]?.m||0,l=getLv(xp),c=xpFor(l),nx=xpFor(l+1),p=l>=99?100:((xp-c)/(nx-c))*100;
          return <div className="pnl"><div className="ph"><Ic id={d.i} s={18}/> {d.n} — Lv {l}</div><div className="pb">

            <div className="ptr" style={{height:18,marginBottom:4}}><div className="ptx">{l>=99?"MAX":xp.toLocaleString()+" / "+nx.toLocaleString()}</div><div className="pfl" style={{width:p+"%",background:"linear-gradient(90deg,"+d.c+","+d.c+"cc)"}}/></div>

            {l>=99&&ml>0&&<div style={{marginTop:6,fontSize:10,color:"#7b42c4"}}>✨ Mastery {getMlv(ml)}/120 ({ml.toLocaleString()} mxp)</div>}
          </div></div>;})()}
      </div>}

      {tab==="quests"&&<div>
        <div style={{display:"flex",gap:4,marginBottom:8}}>{[["active","Active"],["completed","Done"],["all","All"]].map(([k,l])=><button key={k} className={"btn btn-s"+(qf===k?"":" btn-o")} onClick={()=>setQf(k)}>{l}</button>)}<span style={{marginLeft:"auto",fontSize:10,color:"#7a6a50"}}>{cQ.length}/{QUESTS.length}</span></div>
        {(qf==="all"?QUESTS:qf==="completed"?QUESTS.filter(q=>cQ.includes(q.id)):QUESTS.filter(q=>!cQ.includes(q.id)&&!q.pre.some(p=>!cQ.includes(p)))).map(q=>{
          const done=cQ.includes(q.id),locked=q.pre.some(p=>!cQ.includes(p));
          return <div key={q.id} className={"qc"+(done?" done":"")} style={locked?{opacity:.35}:{}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontFamily:"Cinzel,serif",fontWeight:700,fontSize:12,color:done?"#5ddb5d":"#c8a84e"}}>{q.nm}</div><span style={{fontSize:9,color:done?"#3d9b3d":locked?"#5a3a3a":"#7a6a50"}}>{done?"✓":locked?"🔒":"T"+q.tier}</span></div>
            <div style={{fontSize:10,color:"#7a6a50",margin:"2px 0"}}>{q.desc}</div>
            {!locked&&<div style={{fontSize:9,color:"#5ddb5d"}}>{Object.entries(q.xpR).map(([k,v])=>SK[k]?.n+" "+v).join(" · ")}{q.gp>0?" · "+fmtGP(q.gp)+" GP":""}{q.gearR?" · "+(GEAR.find(g=>g.id===q.gearR)?.nm||q.gearR):""}</div>}
          </div>;
        })}
      </div>}

      {tab==="gear"&&<div>
        <div className="pnl"><div className="ph"><Ic id="defence" s={18}/> Equipment — Cmb {cmbLv}</div><div className="pb">
          <div className="gg">{SLOTS.map(s=>{const eid=eq[s],it=eid?GEAR.find(g=>g.id===eid):null;return(<div key={s} className={"gs "+s} onClick={()=>it&&setModal({t:"gd",it})}>{it?<div><div className="gi">{it.ic}</div><div className="gn">{it.nm}</div></div>:<div className="sl">{s}</div>}</div>);})}</div>
          <div style={{textAlign:"center",fontSize:10,color:"#7a6a50"}}>+{gSt.atk||0}atk +{gSt.str||0}str +{gSt.def||0}def +{gSt.hp||0}hp</div>
        </div></div>
        <div className="pnl"><div className="ph">🎒 Inventory ({inv.length})</div><div className="pb">
          {inv.length===0?<div style={{color:"#4a3a22",textAlign:"center",padding:10,fontSize:11}}>Complete quests & kill bosses for gear.</div>
          :<div className="inv">{inv.map(id=>{const it=GEAR.find(g=>g.id===id);if(!it)return null;const isEq=eq[it.sl]===id;return(<div key={id} className="iv" onClick={()=>eqItem(id)} style={isEq?{borderColor:"#3d9b3d",background:"rgba(61,155,61,.05)"}:{}}><div style={{fontSize:20}}>{_E[it.ic]?React.createElement(ItemIc,{ic:it.ic,s:20}):it.ic}</div><div style={{fontSize:8,color:"#c8a84e",fontFamily:"Cinzel,serif"}}>{it.nm}</div><div style={{fontSize:7,color:"#7a6a50"}}>{Object.entries(it.st).map(([k,v])=>"+"+v+k).join(" ")}</div>{isEq&&<div style={{fontSize:7,color:"#3d9b3d"}}>Equipped</div>}</div>);})}</div>}
        </div></div>
      </div>}

      {tab==="bosses"&&<div>{BOSSES.map(b=>{
        const bd=bp[b.id]||{dmg:0,kc:0,todayKilled:false};const dmg=bd.dmg||0;const kc=bd.kc||0;const fought=bd.todayKilled;
        const meetsReq=Object.entries(b.req).every(([k,l])=>getLv(sk[k]?.xp||0)>=l);const canDmg=canDmgBoss(b.mech);
        return <div key={b.id} className="bc">
          <div className="bi"><Ic id={b.ic} s={56}/></div>
          <div style={{fontFamily:"Cinzel,serif",fontWeight:900,fontSize:15,color:kc>0?"#c8a84e":"#e83030",margin:"5px 0 2px"}}>{b.nm}</div>
          {kc>0&&<div style={{fontSize:9,color:"#c8a84e",fontFamily:"Fira Code,monospace"}}>KC: {kc}</div>}
          <div style={{fontSize:10,color:"#7a6a50",margin:"4px 0 6px"}}>{b.desc}</div>
          <div className="ptr" style={{height:16,margin:"6px auto",maxWidth:260}}><div className="ptx">{dmg}/{b.hp} HP</div><div className="pfl" style={{width:(dmg/b.hp*100)+"%",background:"linear-gradient(90deg,#c42b2b,#e83030)"}}/></div>
          <div style={{fontSize:9,color:"#7a6a50",marginBottom:5}}>{Object.entries(b.req).map(([k,l])=>{const met=getLv(sk[k]?.xp||0)>=l;return <span key={k} style={{color:met?"#3d9b3d":"#c42b2b",marginRight:5,display:"inline-flex",alignItems:"center",gap:1}}><Ic id={SK[k]?.i} s={12}/>{l}{met?"✓":"✗"}</span>;})}</div>
          <button className="btn" onClick={()=>atkBoss(b.id)} disabled={!meetsReq||fought}>{fought?"Fought Today":"⚔️ Attack"}</button>
          {canDmg&&!fought&&<span style={{fontSize:9,color:"#3d9b3d",marginLeft:6}}>✓ Mechanic met</span>}
          {!canDmg&&!fought&&meetsReq&&<span style={{fontSize:9,color:"#c42b2b",marginLeft:6}}>✗ Meet mechanic</span>}
          <div style={{marginTop:8,display:"flex",flexWrap:"wrap",justifyContent:"center",gap:3}}>{b.loot.map(l=>{const it=GEAR.find(g=>g.id===l.id)||RARES.find(r=>r.id===l.id);const r=lootRarity(l.r);const got=lootLog.includes(l.id);return <span key={l.id} className={"loot-item loot-"+r} style={got?{opacity:1}:{opacity:.5}}>{_E[it?.ic]?React.createElement(ItemIc,{ic:it.ic,s:12}):it?.ic||"?"} {it?.nm||l.id} <span style={{opacity:.6}}>1/{l.r}</span> {got&&"✓"}</span>;})}</div>
          {b.pet&&<div style={{fontSize:9,color:pets.includes(b.pet.ic)?"#c8a84e":"#4a3a22",marginTop:4}}>Pet: {b.pet.ic} {b.pet.nm} {pets.includes(b.pet.ic)?"✓":""}</div>}
        </div>;})}
      </div>}

      {tab==="diaries"&&<div>
        <div style={{display:"flex",gap:4,marginBottom:8}}>{Object.entries(DREG).map(([k,r])=><button key={k} className={"btn btn-s"+(dr===k?"":" btn-o")} onClick={()=>setDr(k)}>{r.ic} {r.n}</button>)}</div>
        {DT.map(tier=>{const tasks=DIARIES[dr]?.[tier]||[];const dc2=tasks.filter(t=>cD.includes(t.id)).length;return(<div key={tier} className="pnl"><div className="ph" style={dc2===tasks.length?{color:"#5ddb5d"}:{}}>{tier} ({dc2}/{tasks.length}){dc2===tasks.length?" ✓":""}</div><div className="pb">{tasks.map(t=>{const done=cD.includes(t.id);return <div key={t.id} className="dt"><div className={"dot"+(done?" ok":"")}/><span style={{color:done?"#5ddb5d":"#ddd2be"}}>{t.d}</span></div>;})}<div style={{fontSize:9,color:"#7a6a50",marginTop:3}}>+{DXP[tier]} Crafting XP per task</div></div></div>);})}
      </div>}

      {tab==="collection"&&<div>
        <div className="pnl"><div className="ph"><Ic id="gp_coin" s={18}/> Wealth: <span className="gp" style={{marginLeft:6}}>{fmtGP(gp)} GP</span></div><div className="pb" style={{fontSize:11}}>Earn GP from daily claims, quest rewards, and boss loot.</div></div>
        <div className="pnl"><div className="ph">📕 Collection Log ({lootLog.length})</div><div className="pb">
          {BOSSES.map(b=>{const hasAny=b.loot.some(l=>lootLog.includes(l.id));if(!hasAny&&(bp[b.id]?.kc||0)===0)return null;return(<div key={b.id} style={{marginBottom:8}}><div style={{fontSize:11,fontFamily:"Cinzel,serif",color:"#c8a84e",marginBottom:3}}>{b.ic} {b.nm} — KC: {bp[b.id]?.kc||0}</div><div style={{display:"flex",flexWrap:"wrap",gap:2}}>{b.loot.map(l=>{const it=GEAR.find(g=>g.id===l.id)||RARES.find(r=>r.id===l.id);const got=lootLog.includes(l.id);return <span key={l.id} className={"loot-item loot-"+lootRarity(l.r)} style={got?{}:{opacity:.3}}>{_E[it?.ic]?React.createElement(ItemIc,{ic:it.ic,s:12}):it?.ic||"?"} {it?.nm||l.id} {got&&"✓"}</span>;})}</div></div>);})}
          {lootLog.length===0&&<div style={{color:"#4a3a22",fontSize:11,textAlign:"center"}}>Kill bosses to fill your collection log!</div>}
        </div></div>
        <div className="pnl"><div className="ph">🐾 Pets ({pets.length}/{BOSSES.filter(b=>b.pet).length})</div><div className="pb"><div className="pet-g">{BOSSES.filter(b=>b.pet).map(b=><div key={b.id} className={"pet"+(pets.includes(b.pet.ic)?" owned":" locked")} title={b.pet.nm}>{b.pet.ic}</div>)}</div></div></div>
        <div className="pnl"><div className="ph">🏅 Titles</div><div className="pb"><div style={{display:"flex",flexWrap:"wrap",gap:3}}>{TITLES.map(t=>{const own=t.r(stats);return(<div key={t.id} className={"tp"+(own?" owned":" locked")} onClick={()=>{if(own){const nt=title===t.nm?null:t.nm;setTitle(nt);sP(pData({title:nt}));}}} style={title===t.nm?{background:"rgba(200,168,78,.2)"}:{}}>{t.nm}</div>);})}</div></div></div>
        <div className="pnl"><div className="ph">📊 Stats</div><div className="pb" style={{fontSize:11,display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
          <div>Days Logged: <b className="gp">{dl}</b></div><div>Perfect Days: <b className="gp">{pd}</b></div>
          <div>Streak: <b className="gp">{str}</b></div><div>Best Streak: <b className="gp">{bStr}</b></div>
          <div>Perfect Streak: <b className="gp">{bps}</b></div><div>Total Meals: <b className="gp">{tm}</b></div>
          <div>Protein Goals: <b className="gp">{pg}</b></div><div>Cal Goals: <b className="gp">{cg}</b></div>
          <div>Water Goals: <b className="gp">{wg}</b></div><div>Supps Days: <b className="gp">{scd}</b></div>
          <div>Max Protein: <b className="gp">{mp}g</b></div><div>Bosses Slain: <b className="gp">{bk}/{BOSSES.length}</b></div>
        </div></div>
      </div>}

      {tab==="settings"&&<div>
        <div className="pnl"><div className="ph">⚙️ Targets</div><div className="pb">
          <div style={{display:"grid",gridTemplateColumns:"1fr 85px",gap:5,alignItems:"center"}}>
            {[["Calories","calories"],["Protein (g)","protein"],["Water (cups)","water"]].map(([l,k])=>(
              <React.Fragment key={k}><div style={{fontSize:11,color:"#c8a84e",fontFamily:"Cinzel,serif"}}>{l}</div>
              <input className="inp" type="number" value={tgt[k]} onChange={e=>{const nt={...tgt,[k]:Number(e.target.value)};setTgt(nt);sS(nt);}}/></React.Fragment>
            ))}
          </div>
        </div></div>
        <div className="pnl"><div className="ph">🧪 Manage Supps</div><div className="pb">
          <button className="btn btn-s btn-o" style={{marginBottom:6}} onClick={()=>setModal("as")}>+ Add</button>
          {tgt.supplements.map(s=><div key={s} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #16110a",fontSize:11}}><span>{s}</span><button className="mr" onClick={()=>{const nt={...tgt,supplements:tgt.supplements.filter(x=>x!==s)};setTgt(nt);sS(nt);setSupps(supps.filter(x=>x!==s));}}>×</button></div>)}
        </div></div>
        <div className="pnl"><div className="ph">⭐ Custom Foods ({customFoods.length})</div><div className="pb">
          {customFoods.length===0?<div style={{color:"#4a3a22",fontSize:11,textAlign:"center",padding:8}}>Custom foods you create appear here & in search</div>
          :customFoods.map((f,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #16110a",fontSize:11}}><span>{f.n} <span style={{color:"#7a6a50",fontSize:9}}>{f.cal}cal·{f.pro}g</span></span><button className="mr" onClick={()=>{const nc=customFoods.filter((_,j)=>j!==i);setCustomFoods(nc);sCF(nc);}}>×</button></div>)}
        </div></div>
        <div className="pnl"><div className="ph">💾 Backup & Restore</div><div className="pb" style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:"#7a6a50",marginBottom:8}}>Export your save to protect against Safari clearing data. Import to restore.</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
            <button className="btn btn-g" onClick={()=>{const data={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith("ns3"))data[k]=localStorage.getItem(k);}const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="nutriscape-save-"+dk()+".json";a.click();URL.revokeObjectURL(url);toast("Exported!","Save file downloaded");}}>📤 Export Save</button>
            <button className="btn btn-o" onClick={()=>fileRef.current&&fileRef.current.click()}>📥 Import Save</button>
          </div>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(confirm("Restore save? This replaces all current data.")){Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));toast("Imported!","Reloading...");setTimeout(()=>location.reload(),1000);}else{toast("Cancelled","Import cancelled.");}}catch(err){toast("Error","Invalid save file.");}};r.readAsText(f);e.target.value="";}}/>
          <div style={{fontSize:9,color:"#c42b2b",marginTop:8}}>⚠️ Tip: Export regularly! Safari clears localStorage when you clear history.</div>
        </div></div>
        <div className="pnl"><div className="ph">⚠️ Reset</div><div className="pb" style={{textAlign:"center"}}>
          <button className="btn btn-d" onClick={()=>{if(confirm("Reset ALL progress?")){for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k.startsWith("ns3"))localStorage.removeItem(k);}location.reload();}}}>Reset All</button>
        </div></div>
      </div>}
    </div>

    <div className="xdc">{xpD.map(d=><div key={d.id} className="xd" style={{display:"flex",alignItems:"center",gap:3}}><Ic id={SK[d.s]?.i} s={16}/> +{d.a} {SK[d.s]?.n}</div>)}</div>
    <div className="tc">{toasts.map(t=><div key={t.id} className={"tst"+(t.tp==="lu"?" lu":t.tp==="rare"?" rare":"")}><div className="tst-t">{t.t}</div><div className="tst-m">{t.m}</div></div>)}</div>

    {modal==="cf"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>🍽️ Custom Food</h3>
      {[["Name","n","text"],["Calories","cal","number"],["Protein (g)","pro","number"]].map(([l,k,t])=>(<div key={k} style={{marginBottom:5}}><div style={{fontSize:9,color:"#7a6a50"}}>{l}</div><input className="inp" type={t} value={cf[k]} onChange={e=>setCf(p=>({...p,[k]:t==="number"?Number(e.target.value):e.target.value}))}/></div>))}
      <div style={{display:"flex",gap:6,marginTop:8}}><button className="btn" onClick={()=>{if(!cf.n)return;const food={n:cf.n,cal:Number(cf.cal)||0,pro:Number(cf.pro)||0};addMeal(food);const exists=customFoods.some(f=>f.n.toLowerCase()===food.n.toLowerCase());if(!exists){const nc=[food,...customFoods];setCustomFoods(nc);sCF(nc);}setCf({n:"",cal:0,pro:0});setModal(null);}}>Add & Save</button><button className="btn btn-o" onClick={()=>setModal(null)}>Cancel</button></div>
      <div style={{fontSize:9,color:"#7a6a50",marginTop:6}}>Saved custom foods appear in search automatically</div>
    </div></div>}

    {modal==="as"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>🧪 Add Supplement</h3>
      <input className="inp" placeholder="Name..." autoFocus onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){const n=e.target.value.trim();if(!tgt.supplements.includes(n)){const nt={...tgt,supplements:[...tgt.supplements,n]};setTgt(nt);sS(nt);}e.target.value="";setModal(null);}}}/>
      <div style={{fontSize:9,color:"#7a6a50",marginTop:3}}>Press Enter</div>
      <button className="btn btn-o" style={{marginTop:8}} onClick={()=>setModal(null)}>Close</button>
    </div></div>}

    {modal&&modal.t==="gd"&&<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
      <h3>{modal.it.ic} {modal.it.nm}</h3>
      <div style={{fontSize:11,color:"#7a6a50",marginBottom:5}}>Slot: {modal.it.sl} · Tier {modal.it.t}{modal.it.gp>0?" · "+fmtGP(modal.it.gp)+" GP":""}</div>
      {Object.entries(modal.it.st).map(([k,v])=><div key={k} style={{color:"#5ddb5d",fontSize:12}}>+{v} {k}</div>)}
      <div style={{marginTop:5,fontSize:10,color:"#7a6a50"}}>Req: {Object.entries(modal.it.rq).map(([k,l])=>SK[k]?.n+" "+l).join(", ")}</div>
      <button className="btn btn-o" style={{marginTop:8}} onClick={()=>setModal(null)}>Close</button>
    </div></div>}

  </div></div>);
}

ReactDOM.render(React.createElement(NutriScape), document.getElementById("root"));
</script>
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 6px rgba(200,168,78,.25)}50%{box-shadow:0 0 18px rgba(200,168,78,.6)}}
@keyframes xpDrop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
@keyframes bossIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes rareGlow{0%,100%{box-shadow:0 0 12px rgba(160,50,255,.4)}50%{box-shadow:0 0 30px rgba(160,50,255,.8)}}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:#110d06}::-webkit-scrollbar-thumb{background:#4a3a22;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#c8a84e}
body{background:#0b0804;color:#ddd2be;font-family:'Nunito Sans',sans-serif;overflow-x:hidden}
.app{min-height:100vh;background:linear-gradient(180deg,#0b0804,#151008 50%,#0b0804)}
.hdr{background:linear-gradient(180deg,#1c150b,#120e07);border-bottom:2px solid #2e2214;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.logo{font-family:'Cinzel',serif;font-weight:900;font-size:20px;background:linear-gradient(135deg,#c8a84e,#f0d878,#c8a84e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hs{display:flex;gap:12px;align-items:center;font-size:11px;flex-wrap:wrap}
.hs>div{display:flex;align-items:center;gap:3px;color:#c8a84e;font-family:'Cinzel',serif;font-weight:600}
.hs>div span{color:#ddd2be;font-family:'Nunito Sans',sans-serif;font-weight:700}
.nav{display:flex;background:#120e07;border-bottom:1px solid #231a10;overflow-x:auto;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}
.nav button{padding:9px 12px;font-family:'Cinzel',serif;font-size:10.5px;font-weight:600;color:#7a6a50;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .2s;letter-spacing:.4px}
.nav button:hover{color:#c8a84e;background:rgba(200,168,78,.04)}.nav button.on{color:#c8a84e;border-bottom-color:#c8a84e;background:rgba(200,168,78,.07)}
.ct{padding:14px;max-width:880px;margin:0 auto;animation:fadeIn .25s ease}
.pnl{background:linear-gradient(135deg,#16110a,#1c150d);border:1px solid #261e12;border-radius:6px;margin-bottom:11px;overflow:hidden}
.ph{background:linear-gradient(90deg,#201810,#16110a);padding:9px 13px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#c8a84e;border-bottom:1px solid #261e12;display:flex;align-items:center;gap:7px}
.pb{padding:12px}
.ptr{background:#0b0804;border-radius:3px;height:16px;overflow:hidden;border:1px solid #261e12;position:relative}
.pfl{height:100%;border-radius:2px;transition:width .4s;position:relative}
.pfl::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent)}
.ptx{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);z-index:1;white-space:nowrap}
.nr{display:grid;grid-template-columns:90px 60px 1fr;gap:8px;align-items:center;margin-bottom:7px}
.nlb{font-size:12px;color:#c8a84e;font-family:'Cinzel',serif;font-weight:600}
.nvl{font-size:12px;text-align:center;font-weight:700;font-family:'Fira Code',monospace}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:6px}
.stile{background:linear-gradient(135deg,#16110a,#0b0804);border:1px solid #261e12;border-radius:4px;padding:6px;cursor:pointer;text-align:center;transition:all .2s}
.stile:hover{border-color:#c8a84e;transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.3)}
